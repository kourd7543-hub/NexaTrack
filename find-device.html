<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaTrack - Find Device</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Find Device</h1>
            <p>Locate your lost device easily</p>
        </header>

        <div class="find-card">
            <h2>Method 1: Track via Phone Number</h2>
            <div class="input-group">
                <input type="text" id="phoneNumber" placeholder="Enter Phone Number">
                <button class="btn-primary" onclick="trackViaPhone()">Track Now</button>
            </div>
        </div>

        <div class="find-card">
            <h2>Method 2: System Automation (Tasker)</h2>
            <p>Enable background tracking for this device.</p>
            <div class="btn-group">
                <button class="btn-primary" onclick="startNexaAutomation()">Activate Auto</button>
                <button class="btn-secondary" onclick="stopNexaAutomation()">Stop</button>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script src="find-device.js"></script>
</body>
</html>
